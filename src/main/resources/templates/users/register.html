<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="fragments/header :: header"></head>
<body>
<div th:replace="fragments/navigation :: navigation"></div>
<div class="container">
    <div class="row">
        <div class="col-2"></div>
        <div class="col-8">
            <form class="mt-3" th:action="@{/users/register}" method="post">

                <div class="mb-3" th:if="${error}">
                    <p class="text-danger" th:text="${error}"></p>
                </div>

                <div class="mb-3">
                    <label for="name" class="form-label"><b>Имя</b></label>
                    <input type="text" class="form-control" id="name"
                           name="name" placeholder="Иван" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label"><b>Почта</b></label>
                    <input type="email" class="form-control" id="email"
                           name="email" placeholder="ivan@mail.ru" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label"><b>Пароль</b></label>
                    <input type="password" class="form-control"
                           id="password" name="password" required>
                </div>

                <div class="mb-3 row align-items-center">
                    <div class="col-md-6">
                        <p class="mb-0">Уже зарегистрированы?
                            <a th:href="@{/users/login}">Войти</a>
                        </p>
                    </div>
                    <div class="col-md-6 d-flex justify-content-between">
                        <a class="btn btn-danger" th:href="@{/}">Отмена</a>
                        <button class="btn btn-primary" type="submit">Зарегистрироваться</button>
                    </div>
                </div>

            </form>
        </div>
        <div class="col-2"></div>
    </div>
</div>
<footer th:include="fragments/blocks/footer :: footer"></footer>
</body>
</html>
