<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="fragments/header :: header"></head>
<body>
<div th:replace="fragments/navigation :: navigation"></div>
<main class="container mt-4">
<div class="container mt-4">
    <h2>Список сеансов</h2>
    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th scope="col">#</th>
            <th scope="col">Фильм (ID)</th>
            <th scope="col">Зал (ID)</th>
            <th scope="col">Начало</th>
            <th scope="col">Окончание</th>
            <th scope="col">Цена (₽)</th>
            <th scope="col"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="filmSession : ${filmSessions}">
            <td th:text="${filmSession.id}"/>
            <td>
                <span th:each="f : ${film}"
                      th:if="${f.id == filmSession.filmId}"
                      th:text="${f.name}">
                </span>
            </td>
            <td>
                <span th:each="h : ${hall}"
                      th:if="${h.id == filmSession.hallId}"
                      th:text="${h.name}">
                </span>
            </td>
            <td th:text="${#temporals.format(filmSession.startTime, 'dd.MM.yyyy HH:mm')}"/>
            <td th:text="${#temporals.format(filmSession.endTime, 'dd.MM.yyyy HH:mm')}"/>
            <td th:text="${filmSession.price}"/>
            <td>
                <a class="btn btn-sm btn-primary"
                   th:href="@{/tickets/buying(sessionId=${filmSession.id})}">Купить билет</a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Сообщение, если сессий нет -->
    <div th:if="${#lists.isEmpty(filmSessions)}" class="alert alert-info">
        Список сеансов пуст
    </div>
</div>

</main>
<footer th:include="fragments/blocks/footer :: footer"></footer>
</body>
</html>
