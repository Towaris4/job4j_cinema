<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="fragments/header :: header"></head>
<body>
<div th:replace="fragments/navigation :: navigation"></div>

<div class="container mt-4">
    <h2>Список фильмов</h2>
    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th scope="col">#</th>
            <th scope="col">Постер</th>
            <th scope="col">Название</th>
            <th scope="col">Описание</th>
            <th scope="col">Год</th>
            <th scope="col">Жанр</th>
            <th scope="col">Возраст</th>
            <th scope="col">Длительность (мин)</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="film : ${films}">
            <td th:text="${film.id}" />
            <td>
                <div class="mb-3">
                    <img th:src="@{/files/{film.fileId}(film.fileId=${film.fileId})}"
                         class="w-100" alt="No image">
                </div>
            </td>
            <td th:text="${film.name}"/>
            <td th:text="${film.description}" />
            <td th:text="${film.year}" />
            <td>
                <span th:each="g : ${genres}"
                      th:if="${g.id == film.genreId}"
                      th:text="${g.name}">
                </span>
            </td>
            <td th:text="${film.minimalAge}" />
            <td th:text="${film.durationInMinutes}" />
        </tr>
        </tbody>
    </table>

    <!-- Опционально: сообщение, если фильмов нет -->
    <div th:if="${#lists.isEmpty(films)}" class="alert alert-info">
        Список фильмов пуст
    </div>
</div>

<footer th:include="fragments/blocks/footer :: footer"></footer>
</body>
</html>
